<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fast Education</title>
    <link rel="preload" as="image" type="image/webp" href="/src/assets/clans/wolfrin-hero.webp" />
    <link rel="preload" as="image" type="image/webp" href="/src/assets/logo.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Google Fonts CSS loaded async: a plain `<link rel=stylesheet>` here is
      render-blocking, so the browser can't paint the inline hero placeholder
      below until this external roundtrip finishes — directly delaying FCP
      (and therefore LCP, since LCP can never happen before FCP). Loading it
      as `media=print` makes Chrome fetch it at low priority without blocking
      render, then the onload flips it to `all` once it's actually in hand.
      `display=swap` (already in the URL) still governs the font-swap once
      the CSS itself has loaded, so text never goes invisible waiting on it.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"><div id="lcp-hero" style="position:absolute;inset:0;overflow:hidden;background:#0a0a0a">
      <img src="/src/assets/clans/wolfrin-hero.webp" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" />
      <div style="position:absolute;inset:0;display:flex;justify-content:center;padding-top:60px">
        <img src="/src/assets/logo.webp" alt="Fast Education" width="134" height="120" fetchpriority="high" decoding="async" style="height:120px;width:auto;object-fit:contain;filter:brightness(0) invert(1) drop-shadow(0 2px 16px rgba(220,38,38,0.5))" />
      </div>
    </div></div>
    <script>
      if (!/^\/(admin\/login)?$/.test(location.pathname)) {
        document.getElementById('lcp-hero').remove();
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
